services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - db
    volumes:
      - ./frontend:/app

  laravel:
    build: ./backend/laravel
    ports:
      - "8001:8001"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: blog
      DB_USERNAME: postgres
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    profiles: ["laravel"]
    volumes:
      - ./backend/laravel:/app

  django:
    build: ./backend/django
    ports:
      - "8002:8002"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: blog
      DB_USER: postgres
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    profiles: ["django"]
    volumes:
      - ./backend/django:/app

  gin:
    build: ./backend/gin
    ports:
      - "8003:8003"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: blog
      DB_USER: postgres
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    profiles: ["gin"]

  aspsnet:
    build: ./backend/asp.net
    ports:
      - "8004:8004"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: blog
      DB_USER: postgres
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    profiles: ["aspnet"]

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: blog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data: